<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Bakgrund -->
  <rect width="512" height="512" fill="#0f0d15" rx="80"/>

  <!-- Hantel-ikon -->
  <g transform="translate(256, 256)">
    <!-- Stång -->
    <rect x="-120" y="-20" width="240" height="40" fill="#ff2d55" rx="4"/>

    <!-- Vänster vikt -->
    <rect x="-160" y="-60" width="50" height="120" fill="#3b82f6" rx="8"/>
    <rect x="-165" y="-50" width="60" height="100" fill="#2563eb" rx="6" opacity="0.5"/>

    <!-- Höger vikt -->
    <rect x="110" y="-60" width="50" height="120" fill="#3b82f6" rx="8"/>
    <rect x="105" y="-50" width="60" height="100" fill="#2563eb" rx="6" opacity="0.5"/>

    <!-- Detaljer -->
    <circle cx="-135" cy="-70" r="8" fill="#2ed573"/>
    <circle cx="-135" cy="70" r="8" fill="#2ed573"/>
    <circle cx="135" cy="-70" r="8" fill="#2ed573"/>
    <circle cx="135" cy="70" r="8" fill="#2ed573"/>

    <!-- Highlights på stången -->
    <rect x="-120" y="-18" width="240" height="8" fill="#ff5e7e" rx="2" opacity="0.6"/>
  </g>

  <!-- Gradient overlay för djup -->
  <defs>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:black;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#shine)" rx="80"/>
</svg>
